# .pre-commit-config.yaml
# Adapted from codelab 08 (https://codelabs.developers.google.com/secure-agentic-coding).
#
# Uses `language: system` for all hooks: the binaries (end-of-file-fixer,
# trailing-whitespace-fixer, semgrep) are installed into .venv/bin by
# `make install` (via the [security] extra in pyproject.toml). Entries point
# at .venv/bin/<tool> directly (pre-commit always runs hooks from the repo
# root) rather than a bare command name, so commits work from any caller —
# terminal, `uv run git commit`, or an IDE's Source Control panel — without
# needing the venv activated or on PATH.

repos:
  - repo: local
    hooks:
      - id: end-of-file-fixer
        name: End of File Fixer
        entry: .venv/bin/end-of-file-fixer
        language: system
        types: [file]
      - id: trailing-whitespace
        name: Trailing Whitespace
        entry: .venv/bin/trailing-whitespace-fixer
        language: system
        types: [file]
      - id: semgrep
        name: Semgrep Security Scan
        entry: .venv/bin/semgrep --error --config .semgrep/rules.yaml
        language: system
        types: [python]
